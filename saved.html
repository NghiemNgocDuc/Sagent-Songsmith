<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Songs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <a class="ghost-button nav-link" href="index.html">Studio</a>
        <a class="ghost-button nav-link" href="saved.html">Saved Songs</a>
      </section>

      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Your Library</p>
          <h1>Saved songs live here.</h1>
          <p class="lede">
            Reopen, play, download, or clear the songs you saved from the studio.
          </p>
        </div>
        <div class="hero-panel">
          <div class="stat">
            <span class="stat-label">Storage</span>
            <strong>On this browser</strong>
          </div>
          <div class="stat">
            <span class="stat-label">Playback</span>
            <strong>Built in</strong>
          </div>
          <div class="stat">
            <span class="stat-label">Download</span>
            <strong>Any saved mix</strong>
          </div>
        </div>
      </section>

      <section class="result-panel">
        <div class="result-card">
          <div class="section-head">
            <p class="eyebrow">Collection</p>
            <h2>Saved songs</h2>
          </div>
          <div id="savedRoot"></div>
        </div>
      </section>
    </main>

    <script src="saved.js"></script>
  </body>
</html>
